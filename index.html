<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 연구 로드맵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f6;
    --card: #ffffff;
    --text: #1c1917;
    --muted: #78716c;
    --faint: #a8a29e;
    --border: #e7e5e4;
    --border-light: #f5f5f4;
    --track-a: #0ea5e9;
    --track-a-light: #e0f2fe;
    --track-a-mid: #7dd3fc;
    --track-a-dark: #0369a1;
    --track-b: #8b5cf6;
    --track-b-light: #ede9fe;
    --track-b-mid: #c4b5fd;
    --track-b-dark: #6d28d9;
    --track-p: #f43f5e;
    --track-p-light: #ffe4e6;
    --track-p-mid: #fda4af;
    --track-p-dark: #be123c;
    --green: #22c55e;
    --green-light: #f0fdf4;
    --green-border: #86efac;
    --red: #ef4444;
    --yellow: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes checkPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  @keyframes progressGlow {
    0%, 100% { box-shadow: 0 0 4px rgba(34,197,94,0.3); }
    50% { box-shadow: 0 0 12px rgba(34,197,94,0.5); }
  }

  .fade-up { animation: fadeUp 0.4s ease both; }
  .slide-in { animation: slideIn 0.3s ease both; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1c1917 0%, #292524 60%, #1c1917 100%);
    padding: 36px 32px 28px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(14,165,233,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(139,92,246,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  .header-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #a8a29e; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .header h1 { font-size: 30px; font-weight: 900; line-height: 1.2; }
  .header p { font-size: 14px; color: #d6d3d1; margin-top: 6px; }

  /* ── Container ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 32px 60px; }

  /* ── Track Cards ── */
  .track-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .track-card {
    border-radius: 16px; padding: 22px 24px; color: white;
    cursor: pointer; position: relative; overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .track-card:hover { transform: translateY(-3px); }
  .track-card-bg {
    position: absolute; right: -24px; top: -24px;
    font-size: 110px; opacity: 0.07; pointer-events: none;
  }
  .track-card h3 { font-size: 17px; font-weight: 800; }
  .track-card .goal { font-size: 12px; opacity: 0.8; line-height: 1.5; margin: 4px 0 12px; }
  .track-progress-bar {
    height: 5px; background: rgba(255,255,255,0.2);
    border-radius: 3px; overflow: hidden; margin-bottom: 12px;
  }
  .track-progress-fill {
    height: 100%; border-radius: 3px;
    background: rgba(255,255,255,0.85);
    transition: width 0.5s ease;
  }
  .tag {
    display: inline-block; background: rgba(255,255,255,0.15);
    border-radius: 6px; padding: 4px 10px; font-size: 11px;
    margin-right: 6px; margin-bottom: 4px;
  }
  .track-link { margin-top: 14px; font-size: 13px; font-weight: 700; }

  /* ── Gantt ── */
  .gantt-wrap {
    background: var(--card); border-radius: 16px;
    border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px;
  }
  .gantt-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
  }
  .gantt-header h2 { font-size: 15px; font-weight: 700; }
  .filter-btn {
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: white; color: var(--muted); transition: all 0.15s;
  }
  .filter-btn.active {
    border: 1.5px solid #1c1917; background: #1c1917; color: white;
  }

  /* ── Phase Card ── */
  .phase-card {
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
    border: 1px solid; transition: all 0.3s ease;
  }
  .phase-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; flex-wrap: wrap; gap: 6px;
  }

  /* ── Task Row ── */
  .task-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 6px;
    border: 1px solid; margin-bottom: 4px;
    transition: all 0.2s ease;
  }
  .task-row.done { text-decoration: line-through; }

  /* ── Checkbox ── */
  .checkbox {
    width: 18px; height: 18px; border-radius: 4px;
    border: 2px solid #d6d3d1; background: white;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: all 0.2s ease; padding: 0;
  }
  .checkbox.checked { animation: checkPop 0.3s ease; }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }

  /* ── Inline Edit ── */
  .inline-edit {
    cursor: pointer; border-bottom: 1px dashed transparent;
    transition: border-color 0.15s;
  }
  .inline-edit:hover { border-bottom-color: var(--faint); }
  .inline-input {
    border: 1px solid var(--track-a); border-radius: 4px;
    padding: 2px 6px; font-size: inherit; font-weight: inherit;
    font-family: inherit; background: #f0f9ff; outline: none; width: 100%;
  }

  /* ── Add Task ── */
  .add-btn {
    width: 100%; padding: 7px 10px; background: transparent;
    border: 1.5px dashed; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .add-btn:hover { background: rgba(0,0,0,0.02); }
  .add-form {
    padding: 12px; background: var(--bg); border-radius: 8px;
    border: 1.5px solid;
  }
  .add-form input {
    width: 100%; padding: 7px 10px; border-radius: 6px;
    border: 1px solid var(--border); font-size: 12px;
    outline: none; font-family: inherit; box-sizing: border-box;
  }
  .risk-btn {
    padding: 4px 10px; border-radius: 5px; font-size: 10px;
    font-weight: 700; cursor: pointer;
  }
  .submit-btn {
    padding: 5px 14px; border-radius: 6px; border: none;
    color: white; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .cancel-btn {
    padding: 5px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: white;
    font-size: 11px; cursor: pointer; color: var(--muted); font-family: inherit;
  }

  /* ── Badge ── */
  .badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 4px; white-space: nowrap;
  }
  .risk-badge {
    font-size: 9px; font-weight: 700; padding: 1px 6px;
    border-radius: 3px; border: 1px solid; white-space: nowrap;
    background: white;
  }

  /* ── Progress Bar ── */
  .progress-track {
    flex: 1; height: 6px; background: var(--border);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* ── Bottom Cards ── */
  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .risk-card {
    background: var(--card); border-radius: 14px;
    border: 1px solid var(--border); padding: 18px;
  }
  .goals-card {
    background: linear-gradient(135deg, #1c1917, #292524);
    border-radius: 14px; padding: 18px; color: white;
  }

  /* ── Back Button ── */
  .back-btn {
    background: rgba(255,255,255,0.15); border: none; color: white;
    font-size: 12px; font-weight: 600; padding: 6px 14px;
    border-radius: 6px; cursor: pointer; margin-bottom: 14px;
    font-family: inherit; transition: background 0.15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.25); }

  /* ── Detail Header Stats ── */
  .stat-box {
    background: rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 16px;
  }
  .stat-label { font-size: 10px; opacity: 0.7; }
  .stat-value { font-size: 18px; font-weight: 800; }

  /* ── Semester Divider ── */
  .semester-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0 20px 36px;
  }
  .semester-divider .line { height: 1px; flex: 1; }
  .semester-divider .label {
    font-size: 11px; font-weight: 700; color: var(--faint);
    white-space: nowrap; padding: 4px 12px;
    background: var(--border-light); border-radius: 20px;
  }

  /* ── Notion embed hint ── */
  .embed-hint {
    text-align: center; padding: 12px; font-size: 11px;
    color: var(--faint); border-top: 1px solid var(--border-light);
    margin-top: 40px;
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .track-grid, .bottom-grid { grid-template-columns: 1fr; }
    .container { padding: 16px 16px 40px; }
    .header { padding: 24px 16px 20px; }
    .header h1 { font-size: 22px; }
  }
</style>
</head>

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k,v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'className') el.className = v;
      else if (k === 'innerHTML') el.innerHTML = v;
      else el.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function stats(rm) {
  let total = 0, done = 0;
  rm.forEach(p => { total += p.tasks.length; done += p.tasks.filter(t=>t.done).length; });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function phaseDone(phase) {
  return phase.tasks.length > 0 && phase.tasks.every(t => t.done);
}

function renderCheckbox(task, trackColor, trackKey, phaseId) {
  const btn = h('button', {
    className: 'checkbox' + (task.done ? ' checked' : ''),
    style: {
      borderColor: task.done ? trackColor : '#d6d3d1',
      background: task.done ? trackColor : 'white',
    },
    onClick: (e) => {
      e.stopPropagation();
      updateTrack(trackKey, rm => rm.map(p =>
        p.id === phaseId ? {...p, tasks: p.tasks.map(t => t.id === task.id ? {...t, done:!t.done} : t)} : p
      ));
    }
  },
    h('svg', {innerHTML:'<path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>', style:{width:'11px',height:'9px'}})
  );
  // Fix SVG
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','11'); svg.setAttribute('height','9'); svg.setAttribute('viewBox','0 0 12 10'); svg.setAttribute('fill','none');
  svg.style.display = task.done ? 'block' : 'none';
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d','M1 5L4.5 8.5L11 1.5');
  path.setAttribute('stroke','white');
  path.setAttribute('stroke-width','2');
  path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-linejoin','round');
  svg.appendChild(path);
  btn.innerHTML = '';
  btn.appendChild(svg);
  return btn;
}

function renderInlineEdit(value, onSave, extraStyle) {
  const span = h('span', {
    className: 'inline-edit',
    style: extraStyle || {},
  }, value);

  span.addEventListener('click', () => {
    const input = h('input', {
      className: 'inline-input',
      value: value,
      style: { fontSize: extraStyle?.fontSize || '12px' },
    });
    span.replaceWith(input);
    input.focus();
    input.select();
    const commit = () => {
      const v = input.value.trim();
      if (v && v !== value) onSave(v);
      render();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') commit();
      if (e.key === 'Escape') render();
    });
  });
  return span;
}

function renderProgressBar(done, total, color) {
  const pct = total ? Math.round(done/total*100) : 0;
  return h('div', {style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}},
    h('div', {className:'progress-track'},
      h('div', {className:'progress-fill', style:{width:pct+'%', background:`linear-gradient(90deg,${color},${color}cc)`}})
    ),
    h('span', {style:{fontSize:'11px',fontWeight:'700',color:pct===100?'var(--green)':'var(--muted)',minWidth:'36px',textAlign:'right'}}, pct+'%')
  );
}

function renderBadge(status) {
  const map = {
    active: {bg:'#dcfce7',color:'#16a34a',label:'진행 중'},
    upcoming: {bg:'#dbeafe',color:'#2563eb',label:'예정'},
    future: {bg:'#f5f5f4',color:'#a8a29e',label:'2학기 이후'},
    done: {bg:'#dcfce7',color:'#16a34a',label:'✓ 완료'},
  };
  const s = map[status];
  return h('span', {className:'badge', style:{color:s.color,background:s.bg}}, s.label);
}

function renderAddTask(trackKey, phaseId, trackColor) {
  const wrapper = h('div', {style:{marginTop:'8px'}});
  const btn = h('button', {
    className: 'add-btn',
    style: { borderColor: trackColor+'50', color: trackColor },
  }, h('span', {style:{fontSize:'15px',lineHeight:'1'}}, '+'), ' 태스크 추가');

  btn.addEventListener('click', () => {
    wrapper.innerHTML = '';
    const form = h('div', {className:'add-form', style:{borderColor:trackColor+'40'}});
    const nameInput = h('input', {placeholder:'태스크 이름', style:{marginBottom:'8px'}});
    let selectedRisk = 'mid';
    const weekInput = h('input', {placeholder:'목표 일정 (예: 5월 2주)', style:{flex:'1',minWidth:'120px',fontSize:'11px'}});

    const riskBtns = h('div', {style:{display:'flex',gap:'4px'}});
    ['low','mid','high'].forEach(r => {
      const rb = h('button', {
        className:'risk-btn',
        style:{
          border: selectedRisk===r ? `2px solid ${RISK[r].dot}` : '1px solid var(--border)',
          background: selectedRisk===r ? RISK[r].bg : 'white',
          color: RISK[r].dot, fontFamily:'inherit',
        },
      }, RISK[r].label);
      rb.addEventListener('click', () => {
        selectedRisk = r;
        riskBtns.querySelectorAll('.risk-btn').forEach((b,i) => {
          const rr = ['low','mid','high'][i];
          b.style.border = rr===r ? `2px solid ${RISK[rr].dot}` : '1px solid var(--border)';
          b.style.background = rr===r ? RISK[rr].bg : 'white';
        });
      });
      riskBtns.appendChild(rb);
    });

    const submitBtn = h('button', {className:'submit-btn', style:{background:trackColor}}, '추가');
    submitBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      updateTrack(trackKey, rm => rm.map(p =>
        p.id === phaseId ? {...p, tasks:[...p.tasks, {id:makeId(), name, risk:selectedRisk, week:weekInput.value.trim()||'TBD', done:false}]} : p
      ));
    });

    const cancelBtn = h('button', {className:'cancel-btn'}, '취소');
    cancelBtn.addEventListener('click', render);

    nameInput.addEventListener('keydown', e => { if (e.key==='Enter') submitBtn.click(); });

    const row = h('div', {style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}, weekInput, riskBtns, submitBtn, cancelBtn);
    form.append(nameInput, row);
    wrapper.appendChild(form);
    nameInput.focus();
  });

  wrapper.appendChild(btn);
  return wrapper;
}

function renderPhaseCard(phase, trackKey, trackColor, isLast) {
  const isFuture = phase.status === 'future';
  const allDone = phaseDone(phase);
  const doneCount = phase.tasks.filter(t=>t.done).length;
  const displayStatus = allDone ? 'done' : phase.status;

  // Timeline dot + line
  const timeline = h('div', {style:{display:'flex',flexDirection:'column',alignItems:'center',width:'20px',flexShrink:'0'}});
  const dot = h('div', {style:{
    width:'14px',height:'14px',borderRadius:'50%',flexShrink:'0',zIndex:'1',
    border:`3px solid ${allDone?'var(--green)':isFuture?'#d6d3d1':trackColor}`,
    background: allDone?'var(--green)': phase.status==='active'?trackColor:'white',
    display:'flex',alignItems:'center',justifyContent:'center',
  }});
  if (allDone) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','8'); svg.setAttribute('height','6'); svg.setAttribute('viewBox','0 0 12 10'); svg.setAttribute('fill','none');
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M1 5L4.5 8.5L11 1.5'); p.setAttribute('stroke','white'); p.setAttribute('stroke-width','2.5');
    p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round');
    svg.appendChild(p); dot.appendChild(svg);
  }
  timeline.appendChild(dot);
  if (!isLast) {
    const line = h('div', {style:{
      width:'2px', flex:'1',
      background: isFuture ? 'repeating-linear-gradient(to bottom,#d6d3d1 0,#d6d3d1 4px,transparent 4px,transparent 8px)' : allDone ? 'var(--green)' : trackColor,
      opacity: isFuture ? '0.5' : '0.3',
    }});
    timeline.appendChild(line);
  }

  // Card
  const card = h('div', {className:'phase-card', style:{
    background: allDone ? 'var(--green-light)' : isFuture ? '#fafaf9' : 'var(--card)',
    borderColor: allDone ? 'var(--green-border)' : isFuture ? 'var(--border)' : trackColor+'40',
    opacity: isFuture ? '0.7' : '1',
  }});

  // Header
  const header = h('div', {className:'phase-header'});
  const left = h('div', {},
    h('span', {style:{fontSize:'12px',fontWeight:'800',color:allDone?'var(--green)':isFuture?'var(--faint)':trackColor,marginRight:'8px'}}, phase.phase),
    h('span', {style:{fontSize:'14px',fontWeight:'700',color:isFuture?'var(--muted)':'var(--text)'}}, phase.title),
  );
  const right = h('div', {style:{display:'flex',alignItems:'center',gap:'8px'}},
    renderInlineEdit(phase.period, (val) => {
      updateTrack(trackKey, rm => rm.map(p => p.id===phase.id ? {...p,period:val} : p));
    }, {fontSize:'11px',color:'var(--faint)'}),
    renderBadge(displayStatus),
  );
  header.append(left, right);
  card.appendChild(header);

  // Progress
  if (phase.tasks.length > 0) {
    card.appendChild(renderProgressBar(doneCount, phase.tasks.length, allDone?'var(--green)':trackColor));
  }

  // Tasks
  const taskList = h('div', {style:{display:'flex',flexDirection:'column',gap:'4px'}});
  phase.tasks.forEach(task => {
    const r = RISK[task.risk];
    const row = h('div', {className:'task-row', style:{
      background: task.done ? 'var(--green-light)' : isFuture ? '#f5f5f4' : r.bg,
      borderColor: task.done ? 'var(--green-border)' : isFuture ? 'var(--border)' : r.border,
    }});

    row.appendChild(renderCheckbox(task, trackColor, trackKey, phase.id));

    row.appendChild(h('span', {style:{
      flex:'1', fontSize:'12px', fontWeight:'500',
      color: task.done ? 'var(--faint)' : isFuture ? 'var(--faint)' : 'var(--text)',
      textDecoration: task.done ? 'line-through' : 'none',
    }}, task.name));

    if (!isFuture) {
      row.appendChild(renderInlineEdit(task.week, (val) => {
        updateTrack(trackKey, rm => rm.map(p =>
          p.id===phase.id ? {...p,tasks:p.tasks.map(t=>t.id===task.id?{...t,week:val}:t)} : p
        ));
      }, {fontSize:'10px',color:'var(--faint)',whiteSpace:'nowrap'}));
    }

    if (!isFuture && !task.done) {
      row.appendChild(h('span', {className:'risk-badge', style:{color:r.dot,borderColor:r.border}}, r.label));
    }
    if (task.done) {
      row.appendChild(h('span', {className:'risk-badge', style:{color:'var(--green)',borderColor:'var(--green-border)'}}, '완료'));
    }

    taskList.appendChild(row);
  });
  card.appendChild(taskList);

  // Add task
  card.appendChild(renderAddTask(trackKey, phase.id, trackColor));

  return h('div', {style:{display:'flex',gap:'16px'}}, timeline, card);
}

  // Goals
  const goalsCard = h('div', {className:'goals-card'});
  goalsCard.appendChild(h('h3', {style:{fontSize:'13px',fontWeight:'700',margin:'0 0 12px',color:'#d6d3d1'}}, '🎯 1학기 도달 목표'));
  const sA = stats(state.data.A), sB = stats(state.data.B);
  [{icon:'🔥',name:'히트펌프',color:'#7dd3fc',desc:'Phase 2 — 정상상태 COP 문헌 일치',s:sA},
   {icon:'🧠',name:'AI Agent',color:'#c4b5fd',desc:'Step 7 — 도면 공간추출 + 질의 데모',s:sB},
   {icon:'📝',name:'논문',color:'#fda4af',desc:'SCI + Roomvent 투고, 리비전 대응',s:null},
  ].forEach(g => {
    const row = h('div', {style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 12px',background:'rgba(255,255,255,0.06)',borderRadius:'8px',marginBottom:'6px'}});
    row.appendChild(h('span', {style:{fontSize:'18px'}}, g.icon));
    const info = h('div', {style:{flex:'1'}});
    info.appendChild(h('div', {style:{fontSize:'12px',fontWeight:'700',color:g.color}}, g.name));
    info.appendChild(h('div', {style:{fontSize:'11px',color:'#d6d3d1'}}, g.desc));
    if (g.s) {
      const pRow = h('div', {style:{marginTop:'4px',display:'flex',alignItems:'center',gap:'6px'}});
      const pTrack = h('div', {style:{flex:'1',maxWidth:'120px',height:'4px',background:'rgba(255,255,255,0.15)',borderRadius:'2px',overflow:'hidden'}});
      pTrack.appendChild(h('div', {style:{width:g.s.pct+'%',height:'100%',borderRadius:'2px',background:g.color,transition:'width 0.4s'}}));
      pRow.append(pTrack, h('span', {style:{fontSize:'9px',color:'var(--faint)'}}, g.s.done+'/'+g.s.total));
      info.appendChild(pRow);
    }
    row.appendChild(info);
    goalsCard.appendChild(row);
  });
  bottom.appendChild(goalsCard);
  container.appendChild(bottom);

  // Embed hint
  container.appendChild(h('div', {className:'embed-hint'},
    '이 페이지를 Notion에 임베드하려면 /embed 블록에 이 HTML의 호스팅 URL을 붙여넣으세요.'
  ));

  frag.appendChild(container);
  return frag;
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (state.view === 'A' || state.view === 'B') {
    app.appendChild(renderDetailView(state.view));
  } else {
    app.appendChild(renderOverview());
  }
}

render();
</script>
</body>
</html>
