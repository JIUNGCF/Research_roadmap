<html lang="ko">
<head>

<title>2026 연구 로드맵</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f6;
    --card: #ffffff;
    --text: #1c1917;
    --muted: #78716c;
    --faint: #a8a29e;
    --border: #e7e5e4;
    --border-light: #f5f5f4;
    --track-a: #0ea5e9;
    --track-a-light: #e0f2fe;
    --track-a-mid: #7dd3fc;
    --track-a-dark: #0369a1;
    --track-b: #8b5cf6;
    --track-b-light: #ede9fe;
    --track-b-mid: #c4b5fd;
    --track-b-dark: #6d28d9;
    --track-p: #f43f5e;
    --track-p-light: #ffe4e6;
    --track-p-mid: #fda4af;
    --track-p-dark: #be123c;
    --green: #22c55e;
    --green-light: #f0fdf4;
    --green-border: #86efac;
    --red: #ef4444;
    --yellow: #f59e0b;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
  @keyframes checkPop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
  @keyframes popIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
  .fade-up { animation: fadeUp 0.4s ease both; }
  .slide-in { animation: slideIn 0.3s ease both; }

  .header {
    background: linear-gradient(135deg, #1c1917 0%, #292524 60%, #1c1917 100%);
    padding: 36px 32px 28px; color: white; position: relative; overflow: hidden;
  }
  .header::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 80% 20%, rgba(14,165,233,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(139,92,246,0.06) 0%, transparent 60%);
    pointer-events:none;
  }
  .header-inner { max-width:1100px; margin:0 auto; position:relative; z-index:1; }
  .header-label { font-family:'JetBrains Mono',monospace; font-size:11px; color:#a8a29e; letter-spacing:3px; text-transform:uppercase; margin-bottom:8px; }
  .header h1 { font-size:30px; font-weight:900; line-height:1.2; }
  .header p { font-size:14px; color:#d6d3d1; margin-top:6px; }
  .container { max-width:1100px; margin:0 auto; padding:24px 32px 60px; }

  .track-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:28px; }
  .track-card {
    border-radius:16px; padding:20px 22px; color:white;
    cursor:pointer; position:relative; overflow:hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .track-card:hover { transform:translateY(-3px); }
  .track-card-bg { position:absolute; right:-24px; top:-24px; font-size:100px; opacity:0.07; pointer-events:none; }
  .track-card h3 { font-size:15px; font-weight:800; }
  .track-card .goal { font-size:11px; opacity:0.8; line-height:1.5; margin:4px 0 10px; }
  .track-progress-bar { height:5px; background:rgba(255,255,255,0.2); border-radius:3px; overflow:hidden; margin-bottom:10px; }
  .track-progress-fill { height:100%; border-radius:3px; background:rgba(255,255,255,0.85); transition:width 0.5s ease; }
  .tag { display:inline-block; background:rgba(255,255,255,0.15); border-radius:6px; padding:3px 8px; font-size:10px; margin-right:5px; margin-bottom:4px; }
  .track-link { margin-top:12px; font-size:12px; font-weight:700; }

  .gantt-wrap { background:var(--card); border-radius:16px; border:1px solid var(--border); overflow:hidden; margin-bottom:24px; }
  .gantt-header { padding:14px 20px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
  .gantt-header h2 { font-size:15px; font-weight:700; }
  .filter-btn { padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:white; color:var(--muted); transition:all 0.15s; font-family:inherit; }
  .filter-btn.active { border:1.5px solid #1c1917; background:#1c1917; color:white; }
  .gantt-bar { cursor:pointer; transition: filter 0.15s, transform 0.15s; }
  .gantt-bar:hover { filter:brightness(0.92); transform:scaleY(1.15); }
  .week-btn { cursor:pointer; transition:color 0.15s, background 0.15s; border-radius:3px; }
  .week-btn:hover { background:#f5f5f4; color:var(--text) !important; }

  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.35);
    z-index:1000; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(2px);
  }
  .modal-card {
    background:white; border-radius:16px; padding:24px 28px;
    max-width:520px; width:90%; max-height:80vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.2); animation: popIn 0.2s ease;
  }
  .modal-card h3 { font-size:16px; font-weight:800; margin-bottom:14px; }
  .modal-close { float:right; background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted); padding:0 4px; line-height:1; }
  .modal-close:hover { color:var(--text); }

  .phase-card { border-radius:12px; padding:16px; margin-bottom:12px; border:1px solid; transition:all 0.3s ease; }
  .phase-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
  .task-row { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:6px; border:1px solid; margin-bottom:4px; transition:all 0.2s ease; }
  .checkbox {
    width:18px; height:18px; border-radius:4px; border:2px solid #d6d3d1;
    background:white; cursor:pointer; display:flex; align-items:center;

  .inline-edit { cursor:pointer; border-bottom:1px dashed transparent; transition:border-color 0.15s; }

  .inline-input { border:1px solid var(--track-a); border-radius:4px; padding:2px 6px; font-size:inherit; font-weight:inherit; font-family:inherit; background:#f0f9ff; outline:none; width:100%; }

  .risk-dropdown {

  .risk-option {

    transition:background 0.1s; border:none; background:none; width:100%; font-family:inherit;
  }

  .add-btn {

  .risk-btn { padding:4px 10px; border-radius:5px; font-size:10px; font-weight:700; cursor:pointer; font-family:inherit; }
  .submit-btn { padding:5px 14px; border-radius:6px; border:none; color:white; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }
  .cancel-btn { padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:white; font-size:11px; cursor:pointer; color:var(--muted); font-family:inherit; }

  .progress-track { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }

  .risk-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:18px; }

  .stat-box { background:rgba(255,255,255,0.12); border-radius:8px; padding:8px 16px; }
  .stat-label { font-size:10px; opacity:0.7; }
  .stat-value { font-size:18px; font-weight:800; }
  .semester-divider { display:flex; align-items:center; gap:12px; margin:20px 0 20px 36px; }
  .semester-divider .line { height:1px; flex:1; }
  .semester-divider .label { font-size:11px; font-weight:700; color:var(--faint); white-space:nowrap; padding:4px 12px; background:var(--border-light); border-radius:20px; }
  .embed-hint { text-align:center; padding:12px; font-size:11px; color:var(--faint); border-top:1px solid var(--border-light); margin-top:40px; }

  @media (max-width: 900px) { .track-grid { grid-template-columns:1fr; } }
  @media (max-width: 700px) {
    .track-grid, .bottom-grid { grid-template-columns:1fr; }
    .container { padding:16px 16px 40px; }
    .header { padding:24px 16px 20px; }
    .header h1 { font-size:22px; }
  }
</style>
</head>

function setState(p){Object.assign(state,p);render();}
function updateTrack(k,fn){state.data[k]=fn(state.data[k]);render();}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()){if(c==null)continue;el.appendChild(typeof c==='string'?document.createTextNode(c):c);}
  return el;
}

    const ba=h('div',{style:{flex:'15',display:'flex',position:'relative',height:'30px'}});
    WEEKS.forEach(()=>ba.appendChild(h('div',{style:{flex:'1',borderLeft:'1px solid #fafaf9'}})));
    const bar=h('div',{className:'gantt-bar',style:{position:'absolute',left:((phase.start-1)/15*100)+'%',width:((phase.end-phase.start+1)/15*100)+'%',top:'5px',height:'20px',borderRadius:'5px',background:`linear-gradient(135deg,${t.mid},${t.light})`,border:`1.5px solid ${t.mid}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',fontWeight:'700',color:t.color}},phase.cnt+'개');
    bar.addEventListener('click',()=>setState({modal:{type:'gantt',phase}}));
    ba.appendChild(bar);row.appendChild(ba);gi.appendChild(row);
  });gs.appendChild(gi);gw.appendChild(gs);con.appendChild(gw);

  // Bottom
  const bot=h('div',{className:'bottom-grid fade-up',style:{animationDelay:'0.3s'}});
  const rc=h('div',{className:'risk-card'});rc.appendChild(h('h3',{style:{fontSize:'13px',fontWeight:'700',margin:'0 0 12px'}},'⚠️ 1학기 고위험 태스크'));
  const hrt=[...state.data.A,...state.data.B,...state.data.PAPER].filter(p=>p.status!=='future').flatMap(p=>p.tasks.filter(t=>t.risk==='high'&&!t.done).map(t=>({...t,phase:p.phase})));
  if(hrt.length===0)rc.appendChild(h('div',{style:{padding:'12px',background:'var(--green-light)',borderRadius:'6px',fontSize:'12px',color:'#16a34a',textAlign:'center',fontWeight:'600'}},'모든 고위험 태스크를 완료했습니다! 🎉'));
  else hrt.forEach(t=>{const row=h('div',{style:{padding:'6px 10px',background:'#fef2f2',borderRadius:'6px',marginBottom:'4px',border:'1px solid #fecaca',fontSize:'11px',display:'flex',alignItems:'center',gap:'8px'}});row.append(h('div',{style:{width:'5px',height:'5px',borderRadius:'50%',background:'var(--red)',flexShrink:'0'}}),h('span',{style:{flex:'1',fontWeight:'600'}},t.name),h('span',{style:{color:'var(--faint)',fontSize:'10px'}},t.week));rc.appendChild(row);});
  rc.appendChild(h('div',{style:{marginTop:'10px',padding:'8px 10px',background:'#fffbeb',borderRadius:'6px',fontSize:'10px',color:'#92400e',lineHeight:'1.5',border:'1px solid #fde68a'}},'💡 Evaporator 2상 모델 + Noding이 최대 병목. 각 1주 버퍼 확보.'));
  bot.appendChild(rc);

  const gc=h('div',{className:'goals-card'});gc.appendChild(h('h3',{style:{fontSize:'13px',fontWeight:'700',margin:'0 0 12px',color:'#d6d3d1'}},'🎯 1학기 도달 목표'));
  const sA=stats(state.data.A),sB=stats(state.data.B),sP=stats(state.data.PAPER);
  [{icon:'🔥',name:'히트펌프',color:'#7dd3fc',desc:'Phase 2 — 정상상태 COP 문헌 일치',s:sA},{icon:'🧠',name:'AI Agent',color:'#c4b5fd',desc:'Step 7 — 도면 공간추출 + 질의 데모',s:sB},{icon:'📝',name:'논문',color:'#fda4af',desc:'SCI + Roomvent 투고, 리비전 대응',s:sP}].forEach(g=>{
    const row=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 12px',background:'rgba(255,255,255,0.06)',borderRadius:'8px',marginBottom:'6px'}});
    row.appendChild(h('span',{style:{fontSize:'18px'}},g.icon));
    const info=h('div',{style:{flex:'1'}});info.append(h('div',{style:{fontSize:'12px',fontWeight:'700',color:g.color}},g.name),h('div',{style:{fontSize:'11px',color:'#d6d3d1'}},g.desc));
    if(g.s){const pr=h('div',{style:{marginTop:'4px',display:'flex',alignItems:'center',gap:'6px'}});const pt2=h('div',{style:{flex:'1',maxWidth:'120px',height:'4px',background:'rgba(255,255,255,0.15)',borderRadius:'2px',overflow:'hidden'}});pt2.appendChild(h('div',{style:{width:g.s.pct+'%',height:'100%',borderRadius:'2px',background:g.color,transition:'width 0.4s'}}));pr.append(pt2,h('span',{style:{fontSize:'9px',color:'var(--faint)'}},g.s.done+'/'+g.s.total));info.appendChild(pr);}
    row.appendChild(info);gc.appendChild(row);
  });bot.appendChild(gc);con.appendChild(bot);
  con.appendChild(h('div',{className:'embed-hint'},'이 페이지를 Notion에 임베드하려면 /embed 블록에 이 HTML의 호스팅 URL을 붙여넣으세요.'));
  frag.appendChild(con);return frag;
}

function render(){
  const app=document.getElementById('app');app.innerHTML='';
  if(state.view==='A'||state.view==='B'||state.view==='PAPER')app.appendChild(renderDetailView(state.view));
  else app.appendChild(renderOverview());
  const em=document.getElementById('modal-root');if(em)em.remove();
  if(state.modal){const mr=h('div',{id:'modal-root'});mr.appendChild(renderModal());document.body.appendChild(mr);}
}
render();
</script>
</body>
</html>
